# ─── RabbitMQ ────────────────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=admin123

# Reintento automático de conexión al arranque (si RabbitMQ no está listo aún)
spring.rabbitmq.template.retry.enabled=true
spring.rabbitmq.template.retry.initial-interval=2000
spring.rabbitmq.template.retry.multiplier=1.5
spring.rabbitmq.template.retry.max-attempts=10
spring.rabbitmq.template.retry.max-interval=10000

# Reconexión automática si se pierde la conexión en tiempo de ejecución
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=5
spring.rabbitmq.listener.simple.retry.max-interval=15000
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# ─── H2 — base de datos en memoria ───────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:fleetdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── H2 Console (acceso en http://localhost:8080/h2-console) ─────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Servidor ─────────────────────────────────────────────────────────────────
server.port=8080

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.edu.ape006=INFO
logging.level.org.springframework.amqp=WARN
logging.level.com.rabbitmq=WARN
